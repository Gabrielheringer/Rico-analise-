    <link rel="manifest" href="/manifest.json" />

    <script>
      (function() {
        const originalError = console.error;
        console.error = function(...args) {
          const msg = args[0] ? String(args[0]) : '';
          if (msg.includes('WebSocket') || msg.includes('websocket') || msg.includes('failed to connect to websocket')) {
            return;
          }
          originalError.apply(console, args);
        };
      })();
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        // Ignore benign Vite HMR websocket errors in AI Studio environment
        if (msg && (msg.includes('WebSocket') || msg.includes('websocket'))) {
          return true; // Prevents the error from appearing in the console
        }
        return false;
      };
    </script>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
  </head>
  <body>
    <div id="root">
      <div style="background: #0a0a0a; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #00ff41; font-family: monospace; text-align: center; padding: 20px;">

        <div id="debug-info" style="font-size: 8px; color: #222; margin-top: 20px;"></div>
      </div>
    </div>
    <script>
      document.getElementById('debug-info').innerText = 'UA: ' + navigator.userAgent;
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
